name: Daily Data Refresh

on:
  schedule:
    - cron: "17 18 * * *"   # 매일 KST 03:17
  workflow_dispatch:

# Phase 5b — Supabase 의존 0. 데이터 갱신 후 public/data/*.json 변경분을 git commit + push.
# 정적 호스팅(또는 사용자 git pull)이 자동으로 새 데이터 반영.

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci

      # 1) MFDS 공공데이터 4종 → public/data/{ingredients,regulations,countries,meta}.json
      - name: Ingest MFDS public-data APIs
        run: npm run mfds:ingest

      # 2) 각국 1차 소스 (각 fetcher 는 in-place 머지 — 같은 source_document 행만 교체)
      - name: Refresh US FDA 21 CFR 700 (eCFR API)
        run: npm run us:ingest
        continue-on-error: true

      - name: Install Playwright Chromium for fetcher
        run: npx playwright install --with-deps chromium

      - name: Refresh CN NMPA IECIC (Playwright)
        run: npm run cn:iecic
        continue-on-error: true

      - name: Refresh KCIA articles metadata (한국 협회)
        run: npm run kcia:articles
        continue-on-error: true

      # GitHub Actions runner = 미국 IP. 한국 IP 차단된 정부 사이트 우회 시도.
      # 실패해도 데이터 자체엔 영향 X (continue-on-error).
      - name: Try CA Health Canada Hotlist (US-IP from runner)
        run: npm run ca:hotlist
        continue-on-error: true

      # 3) 보조 HTML 소스 hash diff → source-status.json + detected-changes.json + .crawl-raw/
      - name: Crawl HTML sources
        run: npm run crawl
        continue-on-error: true

      # 3) Gemini 듀얼 파싱 (변경된 raw 만) → regulations.json + quarantine.json
      - name: Parse changed HTML sources
        run: npm run parse
        continue-on-error: true

      # 4) 변경분 commit + push
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Upload raw snapshots (for audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-raw-${{ github.run_id }}
          path: .crawl-raw/
          retention-days: 14
          if-no-files-found: ignore
