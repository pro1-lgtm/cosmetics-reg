name: Daily Data Refresh

on:
  schedule:
    - cron: "17 18 * * *"   # 매일 KST 03:17
  workflow_dispatch:
  # crawl.yml 자체 변경 시 즉시 1회 trigger (workflow_dispatch UI 가 push 직후 인식 지연되는 케이스 보완).
  push:
    branches: [main]
    paths:
      - '.github/workflows/crawl.yml'
      - 'scripts/fetchers/**'

# Phase 5b — Supabase 의존 0. 데이터 갱신 후 public/data/*.json 변경분을 git commit + push.
# 정적 호스팅(또는 사용자 git pull)이 자동으로 새 데이터 반영.

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MFDS_API_KEY: ${{ secrets.MFDS_API_KEY }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci

      # 1) MFDS 공공데이터 4종 → public/data/{ingredients,regulations,countries,meta}.json
      - name: Ingest MFDS public-data APIs
        run: npm run mfds:ingest

      # 2) 각국 1차 소스 (각 fetcher 는 in-place 머지 — 같은 source_document 행만 교체)
      - name: Refresh US FDA 21 CFR 700 (eCFR API)
        run: npm run us:ingest
        continue-on-error: true

      # US 색소 positive list (Part 73 Subpart C 인증면제 + Part 74 Subpart C 인증요구)
      # + California AB 2762 (24 banned, 2025-01-01 발효).
      - name: Refresh US 21 CFR 73/74 Subpart C 색소 + California AB 2762
        run: npm run us:colors
        continue-on-error: true

      - name: Install Playwright Chromium for fetcher
        run: npx playwright install --with-deps chromium

      - name: Refresh CN NMPA IECIC (Playwright)
        run: npm run cn:iecic
        continue-on-error: true

      # KCIA 게시물 metadata + 첨부 자동 다운로드. 14208 안전기술규범 등 비회원
      # 다운로드 가능 확인됨. 첨부 파일명에 timestamp 포함 → 변경 시 새 파일.
      # 새 게시물·새 개정공고 첨부도 자동 추가.
      - name: Refresh KCIA articles + 첨부 자동 다운로드
        run: npm run kcia:articles
        continue-on-error: true

      # CN NMPA 안전기술규범 — KCIA 14208 한국어 번역본 Excel(7표) 파싱.
      # 사용금지 + 사용제한 + 준용(positive list 4종) 1733 entries → CN 규제.
      # KCIA 첨부 자동 다운로드 step 직후 실행.
      - name: Parse CN NMPA 安全技术规范 (KCIA xlsx)
        run: npm run cn:safety
        continue-on-error: true

      # KCIA 게시물의 PDF/xlsx 첨부 Gemini 자동 파싱 — 14208 외 모든 게시물.
      # SHA256 fingerprint 비교 → 변경된 첨부만 처리.
      # 새 법령(중국·미국·브라질·콜롬비아 등 모든 KCIA 카테고리)이 KCIA 에 올라오면
      # 자동 발견 → 자동 다운 → Gemini 자동 파싱 → regulations.json 머지.
      # 무료 tier 안 (일 5 요청 미만 예상).
      - name: Parse KCIA 첨부 (Gemini 자동 — 14208 외 모든 게시물)
        run: npm run kcia:parse
        continue-on-error: true

      # ASEAN Cosmetic Directive — 6국 (VN/TH/ID/MY/PH/SG) fanout. 1차 출처.
      # PDF 자동 다운로드 + 정규식 직접 파싱 (Gemini 의존 0).
      - name: Parse ASEAN ACD Annex II/III/IV/VI/VII (6국 fanout)
        run: npm run asean:acd
        continue-on-error: true

      # BR ANVISA RDC — KCIA 15087 zip 첨부에서 RDC PDF 자동 추출 + 파싱.
      # RDC 83 (banned) + 03 (restricted) + 29 (preservatives) + 628 (colorants) + 600 (UV).
      - name: Parse BR ANVISA RDC (KCIA zip 경유)
        run: npm run br:anvisa
        continue-on-error: true

      - name: Refresh JP MHLW PDFs (auto download + hash diff)
        run: npm run jp:mhlw
        continue-on-error: true

      - name: Parse JP MHLW PDF (Appendix 1+3+4 → regulations)
        run: npm run jp:parse
        continue-on-error: true

      # JP MHLW 別表 1 (品目ごと承認対象成分 positive list, ~2643 종) — 105 page PDF.
      # 정규식 직접 (Gemini 0). 카테고리 (1)~(11) × 성분 매트릭스 → JP regulations.
      - name: Parse JP MHLW 別表 1 (品目ごと承認対象成分 positive list)
        run: npm run jp:annex1
        continue-on-error: true

      - name: Refresh TW TFDA preservative-restricted list
        run: npm run tw:tfda
        continue-on-error: true

      # GitHub Actions runner = 미국 IP. 한국 IP 차단된 정부 사이트 우회 시도.
      # 실패해도 데이터 자체엔 영향 X (continue-on-error).
      - name: Try CA Health Canada Hotlist (US-IP from runner)
        run: npm run ca:hotlist
        continue-on-error: true

      # 차단 사이트들의 메인 페이지 raw HTML 자동 저장 (분석 추후).
      # EU EUR-Lex — main text HTML (Annex 목차만) + consolidated PDF (Annex 본문 통합)
      - name: Try EU EUR-Lex 1223/2009 main HTML
        run: npm run fetch:try -- EU "https://eur-lex.europa.eu/eli/reg/2009/1223/oj/eng" eu_eurlex_1223
        continue-on-error: true

      - name: Try EU EUR-Lex 1223/2009 consolidated PDF (Annex 본문 포함)
        run: npm run eu:pdf
        continue-on-error: true

      - name: Parse EU EUR-Lex PDF (Annex II/III/IV/V/VI → regulations)
        run: npm run eu:parse
        continue-on-error: true

      - name: Try BR ANVISA cosmetics index
        run: npm run fetch:try -- BR "https://www.gov.br/anvisa/pt-br/assuntos/cosmeticos" br_anvisa_index
        continue-on-error: true

      - name: Try AR ANMAT cosmetics index
        run: npm run fetch:try -- AR "https://www.argentina.gob.ar/anmat/regulados/cosmeticos" ar_anmat_index
        continue-on-error: true

      - name: Try CN NMPA cosmetic regulations
        run: npm run fetch:try -- CN "https://www.nmpa.gov.cn/xxgk/fgwj/gzwj/gzwjhzhp/index.html" cn_nmpa_regulations
        continue-on-error: true

      # 3) 보조 HTML 소스 hash diff → source-status.json + detected-changes.json + .crawl-raw/
      - name: Crawl HTML sources
        run: npm run crawl
        continue-on-error: true

      # 3) Gemini 듀얼 파싱 (변경된 raw 만) → regulations.json + quarantine.json
      - name: Parse changed HTML sources
        run: npm run parse
        continue-on-error: true

      # 4) 변경분 commit + push
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Upload raw snapshots (for audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-raw-${{ github.run_id }}
          path: .crawl-raw/
          retention-days: 14
          if-no-files-found: ignore
