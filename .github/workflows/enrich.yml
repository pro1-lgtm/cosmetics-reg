name: Daily Enrichment

# Gemini 가 ingredients.json 의 4 필드(chinese_name / japanese_name /
# function_category / function_description) 를 매일 일부 채움. enrich-functions.ts
# 가 누락 ingredient 를 regulations 참조 카운트 desc 순으로 정렬, --limit=200 처리.
# Gemini Flash 무료 quota 는 20 RPM / 250 RPD — 200 건 + 6초 간격 = ~20분.
# 연속 5회 429 시 자동 중단.

on:
  schedule:
    - cron: "0 19 * * *"   # 매일 KST 04:00 (crawl.yml KST 03:17 직후)
  workflow_dispatch:
    inputs:
      limit:
        description: "처리할 ingredient 수"
        default: "200"
        required: false
      force:
        description: "이미 채워진 필드도 재호출"
        default: "false"
        required: false

permissions:
  contents: write

# crawl.yml 과 동시 실행 시 ingredients.json push 충돌 방지
concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          # commit 후 push 시 latest 위에 rebase 위해 fetch-depth 충분히
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      # Gemini quota 가 비어있을 가능성 → continue-on-error 로 워크플로우 자체는 항상 success.
      # 5회 연속 429 시 enrich-functions.ts 가 자동 break.
      - name: Run Gemini enrichment
        env:
          ENRICH_LIMIT: ${{ github.event.inputs.limit || '200' }}
          ENRICH_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          ARGS="--limit=$ENRICH_LIMIT"
          if [ "$ENRICH_FORCE" = "true" ]; then ARGS="$ARGS --force"; fi
          npm run enrich:functions -- $ARGS
        continue-on-error: true

      - name: Commit enrichment changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 다른 워크플로우(crawl.yml)가 동안 push 했을 가능성 → rebase 후 push
          git fetch origin main
          git rebase origin/main || (git rebase --abort && git reset --hard origin/main && exit 0)
          git add public/data/ingredients.json
          if git diff --cached --quiet; then
            echo "no enrichment changes"
            exit 0
          fi
          git commit -m "chore(enrich): daily Gemini $(date -u +%Y-%m-%dT%H:%MZ)"
          # push 충돌 시 한 번 retry
          git push || (git pull --rebase origin main && git push)
