name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  static:
    name: 타입 + 린트
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: tsc noEmit
        run: npx tsc --noEmit
      - name: eslint (사용자 코드)
        run: npx eslint .

  e2e:
    name: 정적 빌드 + E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      E2E_BASE: http://localhost:3010
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build static site (out/)
        run: npm run build
      - name: Serve out/ on :3010 (background)
        run: |
          npx --yes serve out -l 3010 &
          for i in {1..30}; do curl -sf http://localhost:3010/ >/dev/null && break; sleep 1; done
      - name: Run E2E scenarios
        run: npm run e2e
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shots-${{ github.run_id }}
          path: .e2e-shots/
          retention-days: 7
          if-no-files-found: ignore
